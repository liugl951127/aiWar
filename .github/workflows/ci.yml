name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B
        env:
          MAVEN_OPTS: -Xmx1g

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/
            !**/target/surefire-reports/*.xml

  package:
    name: Package fat jar
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package
        run: mvn package -DskipTests -B

      - name: Verify jar exists
        run: |
          test -f openclaw-wargame-demo/target/openclaw-wargame-demo-1.0.0.jar
          ls -lh openclaw-wargame-demo/target/openclaw-wargame-demo-1.0.0.jar

      - name: Smoke test (run demo for 5 ticks)
        run: |
          timeout 30 java -jar openclaw-wargame-demo/target/openclaw-wargame-demo-1.0.0.jar 42 5 || true

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-wargame-demo
          path: openclaw-wargame-demo/target/openclaw-wargame-demo-1.0.0.jar
