version: "3.8"

# OpenClaw Wargame — 完整启动 docker-compose
#
# 使用：
#   docker compose up --build
#   docker compose up --build --scale wargame=3   # 启动 3 个实例
#
# 然后浏览器打开 http://localhost:18080/

services:
  wargame:
    build: .
    image: openclaw-wargame:1.3.0
    container_name: openclaw-wargame
    ports:
      - "18080:18080"   # HTTP dashboard
      - "18081:18081"   # WebSocket
    environment:
      - WG_SEED=42
      - WG_MAX_TICKS=300
      - WG_PORT=18080
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18080/api/snapshot || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 1.0

  # 可选：nginx 反向代理（如果你想加 HTTPS）
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
